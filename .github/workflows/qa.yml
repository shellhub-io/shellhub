name: QA

on:
  push:
    branches: [master]

  pull_request:
    branches: [master]
    types: [assigned, opened, synchronize, reopened, edited, ready_for_review]

jobs:
  validate:
    name: validate (${{ matrix.project }}${{ matrix.database && format(' - {0}', matrix.database) || '' }})
    if: ${{ github.event.pull_request.draft == false }}

    strategy:
      fail-fast: false
      matrix:
        project: [api, agent, pkg, ssh, cli]
        database: ['']  # Empty by default
        include:
          - project: api
            extra_args: ""
            lint_args: ""
          - project: agent
            extra_args: "-tags docker"
            lint_args: "--build-tags docker"
          - project: pkg
            extra_args: ""
            lint_args: ""
          - project: ssh
            extra_args: "-tags internal_api"
            lint_args: "--build-tags internal_api"
          - project: cli
            extra_args: ""
            lint_args: ""
          # Integration tests with PostgreSQL
          - project: tests
            extra_args: ""
            lint_args: ""
            database: postgres

    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Restore Docker image cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/docker-cache
          key: docker-${{ runner.os }}

      - name: Load cached Docker images
        run: |
          if [ -d /tmp/docker-cache ]; then
            for f in /tmp/docker-cache/*.tar; do
              docker load -i "$f"
            done
          fi

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          # inline YAML or path to separate file (e.g.: .github/filters.yaml)
          filters: |
            go:
              - 'api/**'
              - 'agent/**'
              - 'pkg/**'
              - 'ssh/**'
              - 'cli/**'
              - 'gateway/**'
              - 'tests/**'

      - name: Set up Go 1.x [Go]
        if: steps.filter.outputs.go == 'true' && github.event.pull_request.draft == false
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
        id: go

      - name: Get Go dependencies [Go]
        if: steps.filter.outputs.go == 'true' && github.event.pull_request.draft == false
        working-directory: ${{ matrix.project }}
        run: go mod download

      - name: Ensure Go dependencies are complete [Go]
        if: steps.filter.outputs.go == 'true' && github.event.pull_request.draft == false
        working-directory: ${{ matrix.project }}
        run: |
          ../devscripts/prepare-release
          if [ -n "$(git status --porcelain)" ]; then
              echo "Missing dependencies on 'go.mod'"
              exit 1
          fi

      - name: Code format [Go]
        run: if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then exit 1; fi
        if: matrix.os == 'ubuntu-latest' && github.event.pull_request.draft == false

      - name: Code linting [Go]
        if: steps.filter.outputs.go == 'true' && github.event.pull_request.draft == false
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          working-directory: ${{ matrix.project }}
          version: v2.11.3
          args: --timeout 2m ${{ matrix.lint_args }} ./...
          skip-cache: true

      - name: Set SHELLHUB_DATABASE for integration tests
        if: matrix.project == 'tests' && matrix.database != '' && steps.filter.outputs.go == 'true' && github.event.pull_request.draft == false
        run: |
          # Update .env file with the correct database backend
          sed -i 's/^SHELLHUB_DATABASE=.*/SHELLHUB_DATABASE=${{ matrix.database }}/' .env
          echo "Running integration tests with database: ${{ matrix.database }}"

      - name: Unit test [Go]
        if: steps.filter.outputs.go == 'true' && github.event.pull_request.draft == false
        working-directory: ${{ matrix.project }}
        run: go test ${{ matrix.extra_args }} -timeout 25m ./...
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Go build [Go]
        if: matrix.project != 'tests' && steps.filter.outputs.go == 'true' && github.event.pull_request.draft == false
        working-directory: ${{ matrix.project }}
        run: go build -v ${{ matrix.extra_args }} ./...

      - name: Save Docker images to cache
        if: always()
        run: |
          mkdir -p /tmp/docker-cache
          docker images --format '{{.Repository}}:{{.Tag}}' | \
            grep -v '<none>' | while read img; do
              name=$(echo "$img" | tr '/:' '_')
              docker save -o "/tmp/docker-cache/${name}.tar" "$img" 2>/dev/null || true
            done

  gateway-lint:
    name: lint (gateway)
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            go:
              - 'gateway/**'

      - name: Code linting [Go]
        if: steps.filter.outputs.go == 'true'
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          working-directory: gateway
          version: v2.11.3
          args: --timeout 2m ./...
          skip-cache: true
