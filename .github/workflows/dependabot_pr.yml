name: dependabot_pr

on:
  pull_request_target:
    branches: [master]
    paths:
      - '**/go.mod'
      - '**/go.sum'

# pull_request_target runs with repository secrets, and the job below checks out
# and operates on the PR branch. That is only safe because the job is gated to
# runs authored by dependabot itself (user.login == 'dependabot[bot]', which a
# fork PR cannot spoof); the private-module `go mod tidy` needs secrets.PAT in
# the same context as the branch, so the untrusted-context split does not apply.
# Do not relax the guard below. GITHUB_TOKEN is read-only here — the push
# authenticates with secrets.PAT, not GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  go-mod-tidy:
    name: Update Go modules
    if: startsWith(github.head_ref, 'dependabot/go_modules/') && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-24.04
    steps:
      # nosemgrep: yaml.github-actions.security.pull-request-target-code-checkout.pull-request-target-code-checkout
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2
          token: ${{ secrets.PAT }}
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
      - name: Configure Git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"
      - name: Run prepare-release script to update Go modules
        env:
          GOPRIVATE: github.com/shellhub-io/cloud
        run: |
          ./devscripts/prepare-release
      - name: Get last commit message
        id: last-commit-message
        run: |
          echo "msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          branch: ${{ github.event.workflow_run.head_branch }}
          file_pattern: '**/go.mod **/go.sum'
          commit_message: ${{ steps.last-commit-message.outputs.msg }}
          commit_options: '--amend --no-edit'
          push_options: '--force'
          skip_fetch: true
