name: docker-publish

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build, scan and publish '${{ matrix.project }}' to Docker Registry

    # Each image is built, scanned, then pushed independently so a scan failure
    # only blocks that image. fail-fast: false lets the other images continue.
    strategy:
      fail-fast: false
      matrix:
        project: [api, ssh, gateway, ui, cli, api-enterprise]

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout shellhub source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: shellhub

      - name: Generate cloud repo token (api-enterprise only)
        id: cloud-token
        if: matrix.project == 'api-enterprise'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.CLOUD_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CLOUD_DISPATCH_APP_PRIVATE_KEY }}
          owner: shellhub-io
          repositories: cloud

      - name: Checkout cloud source (api-enterprise only)
        if: matrix.project == 'api-enterprise'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: shellhub-io/cloud
          token: ${{ steps.cloud-token.outputs.token }}
          ref: ${{ github.ref_name }}
          path: cloud

      - name: Get release version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "RELEASE_VERSION=$REF_NAME" >> "$GITHUB_ENV"

      - name: Set image registry and name
        id: image
        run: |
          if [[ "${{ matrix.project }}" == "api-enterprise" ]]; then
            echo "name=registry.infra.ossystems.io/shellhub/api-enterprise" >> "$GITHUB_OUTPUT"
          else
            echo "name=shellhubio/${{ matrix.project }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to Docker Hub (community images)
        if: matrix.project != 'api-enterprise'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to private Docker Registry (api-enterprise)
        if: matrix.project == 'api-enterprise'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: registry.infra.ossystems.io
          username: ${{ secrets.PORTUS_USERNAME }}
          password: ${{ secrets.PORTUS_TOKEN }}

      # The image is tagged but NOT pushed yet so Trivy can scan it first.
      - name: Build '${{ matrix.project }}' image (load only, no push)
        if: matrix.project != 'api-enterprise'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          push: false
          load: true
          tags: ${{ steps.image.outputs.name }}:${{ env.RELEASE_VERSION }}
          file: shellhub/${{ matrix.project }}/Dockerfile
          context: shellhub
          cache-from: type=gha,scope=${{ matrix.project }}
          cache-to: type=gha,scope=${{ matrix.project }},mode=max

      - name: Build 'api-enterprise' image (load only, no push)
        if: matrix.project == 'api-enterprise'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          push: false
          load: true
          tags: ${{ steps.image.outputs.name }}:${{ env.RELEASE_VERSION }}
          file: shellhub/api/Dockerfile
          context: shellhub
          build-args: EDITION=enterprise
          build-contexts: cloud-src=./cloud
          cache-from: type=gha,scope=${{ matrix.project }}
          cache-to: type=gha,scope=${{ matrix.project }},mode=max

      # Scan BEFORE pushing — failures here abort the job; nothing has been pushed yet.
      # .trivyignore is always at shellhub/.trivyignore because all sources
      # are checked out under the shellhub/ subdirectory.
      - name: Scan '${{ matrix.project }}' image with Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/work:ro" \
            ghcr.io/aquasecurity/trivy:0.63.0 image \
              --severity CRITICAL,HIGH \
              --ignore-unfixed \
              --scanners vuln \
              --exit-code 1 \
              --ignorefile /work/shellhub/.trivyignore \
              ${{ steps.image.outputs.name }}:${{ env.RELEASE_VERSION }}

      # Push the SAME image that was just scanned — `docker push` re-uses the layers in the local Docker
      # daemon — no rebuild occurs, so the pushed digest is identical to what
      # Trivy scanned.
      #
      # NOTE: cross-registry push is sequential, not transactional. If the
      # versioned-tag push succeeds but the `latest` push fails (or vice versa),
      # the registry will hold a partial set of tags. Re-running the workflow is
      # safe: buildx GHA cache ensures digest-identical layers on the next run.
      - name: Push '${{ matrix.project }}' image (same digest as scanned)
        run: |
          docker tag \
            "${{ steps.image.outputs.name }}:${{ env.RELEASE_VERSION }}" \
            "${{ steps.image.outputs.name }}:latest"
          docker push "${{ steps.image.outputs.name }}:${{ env.RELEASE_VERSION }}"
          docker push "${{ steps.image.outputs.name }}:latest"

      - name: Generate SBOM for '${{ matrix.project }}' image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ steps.image.outputs.name }}:${{ env.RELEASE_VERSION }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.project }}-${{ env.RELEASE_VERSION }}.cdx.json
          upload-artifact: false

      - name: Generate SBOM for '${{ matrix.project }}' source
        if: matrix.project != 'api-enterprise'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: shellhub/${{ matrix.project }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.project }}-source-${{ env.RELEASE_VERSION }}.cdx.json
          upload-artifact: false

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-${{ matrix.project }}
          path: sbom-${{ matrix.project }}-*.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Attach SBOM to '${{ matrix.project }}' image
        run: |
          cosign attach sbom \
            --sbom "sbom-${{ matrix.project }}-${{ env.RELEASE_VERSION }}.cdx.json" \
            --type cyclonedx \
            "${{ steps.image.outputs.name }}:${{ env.RELEASE_VERSION }}"

  release-sboms:
    name: Attach SBOMs to GitHub Release
    needs: [build]
    runs-on: ubuntu-24.04

    steps:
      - name: Download all SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sbom-*
          merge-multiple: true

      - name: Attach SBOMs to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: sbom-*.cdx.json
