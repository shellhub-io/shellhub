name: UI

on:
  push:
    branches: [master]

  pull_request:
    branches: [master]
    types: [assigned, opened, synchronize, reopened, edited, ready_for_review]

jobs:
  validate:
    name: validate (${{ matrix.app }})
    if: ${{ github.event.pull_request.draft == false }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: console
            workspace: "@shellhub/console"
          - app: docs
            workspace: "@shellhub/docs"
          - app: website
            workspace: "@shellhub/website"
          - app: design-system
            workspace: "@shellhub/design-system"

    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            console:
              - 'ui/apps/console/**'
              - 'ui/packages/**'
              - 'ui/package.json'
              - 'ui/package-lock.json'
              - 'ui/eslint.config.js'
              - 'openapi/spec/**'
            docs:
              - 'ui/apps/docs/**'
              - 'ui/packages/**'
              - 'ui/package.json'
              - 'ui/package-lock.json'
              - 'ui/eslint.config.js'
            website:
              - 'ui/apps/website/**'
              - 'ui/packages/**'
              - 'ui/package.json'
              - 'ui/package-lock.json'
              - 'ui/eslint.config.js'
            design-system:
              - 'ui/packages/design-system/**'

      - name: Set up Node.JS 24.13.0 [${{ matrix.app }}]
        if: steps.filter.outputs[matrix.app] == 'true'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.13.0"

      - name: Cache node modules [${{ matrix.app }}]
        if: steps.filter.outputs[matrix.app] == 'true'
        uses: actions/cache@v5
        with:
          path: ui/node_modules
          key: ${{ runner.OS }}-ui-${{ hashFiles('ui/package-lock.json') }}

      - name: Install Node Dependencies [${{ matrix.app }}]
        if: steps.filter.outputs[matrix.app] == 'true'
        working-directory: ui
        run: npm install

      - name: Generate OpenAPI client [${{ matrix.app }}]
        if: steps.filter.outputs[matrix.app] == 'true' && matrix.app == 'console'
        working-directory: ui
        run: |
          npx @redocly/cli@2.31.5 bundle ../openapi/spec/openapi.yaml -o /tmp/openapi.json --force
          OPENAPI_SPEC_PATH=/tmp/openapi.json npm run generate -w ${{ matrix.workspace }}

      - name: Astro sync [${{ matrix.app }}]
        if: steps.filter.outputs[matrix.app] == 'true' && matrix.app == 'docs'
        working-directory: ui
        run: npm run sync -w @shellhub/docs

      - name: Unit test [${{ matrix.app }}]
        if: steps.filter.outputs[matrix.app] == 'true'
        working-directory: ui
        run: npm run test -w ${{ matrix.workspace }}

      - name: Code linting [${{ matrix.app }}]
        if: steps.filter.outputs[matrix.app] == 'true' && matrix.app != 'design-system'
        working-directory: ui
        run: npm run lint -w ${{ matrix.workspace }}

      - name: Build [${{ matrix.app }}]
        if: steps.filter.outputs[matrix.app] == 'true' && matrix.app != 'design-system'
        working-directory: ui
        run: npm run build -w ${{ matrix.workspace }}
