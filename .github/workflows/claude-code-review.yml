name: Claude Code Review

on:
  # Automatic review only on PR opened (no synchronize — author drives re-review)
  # Using pull_request_target because shellhub is public (fork PRs need secrets)
  pull_request_target:
    types: [opened]
    branches: [master]

  # Manual review via /review command in comments
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude Code Review
    if: |
      (github.event_name == 'pull_request_target' && !github.event.pull_request.draft && github.event.pull_request.user.type != 'Bot') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/review') && github.event.comment.user.type != 'Bot') ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '/review') && github.event.comment.user.type != 'Bot') ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '/review') && github.event.review.user.type != 'Bot')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Generate cross-repo token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CLOUD_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CLOUD_DISPATCH_APP_PRIVATE_KEY }}
          owner: shellhub-io
          repositories: cloud,claude

      # For issue_comment events, github.event.pull_request.head.sha is
      # unavailable (the payload only has github.event.issue). Resolve the
      # PR head SHA via the REST API so no git checkout is needed yet.
      - name: Resolve PR head ref
        id: pr-ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -n "$PR_SHA" ]]; then
            echo "sha=$PR_SHA" >> "$GITHUB_OUTPUT"
          else
            SHA=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" | jq -r '.head.sha')
            if [[ -z "$SHA" || "$SHA" == "null" ]]; then
              echo "::error::Failed to resolve PR head SHA for PR #$PR_NUMBER"
              exit 1
            fi
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout shellhub (PR branch)
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.pr-ref.outputs.sha }}

      - name: Check /review authorization
        id: auth-check
        if: github.event_name != 'pull_request_target'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EVENT_NAME: ${{ github.event_name }}
          REVIEW_USER: ${{ github.event.review.user.login }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          COMMENT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request_review" ]]; then
            USERNAME="$REVIEW_USER"
          else
            USERNAME="$COMMENT_USER"
          fi

          HTTP_STATUS=$(gh api orgs/shellhub-io/teams/admin/memberships/"$USERNAME" \
            --silent -i 2>/dev/null | head -1 | awk '{print $2}') || true
          [[ "$HTTP_STATUS" =~ ^[0-9]+$ ]] || HTTP_STATUS="000"

          if [[ "$HTTP_STATUS" == "200" ]]; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          elif [[ "$HTTP_STATUS" == "404" ]]; then
            echo "authorized=false" >> "$GITHUB_OUTPUT"

            GH_TOKEN="$COMMENT_TOKEN" gh pr comment "$PR_NUMBER" \
              --body "@$USERNAME You are not authorized to request an explicit review. If you believe this PR needs a new automated review round, please tag the \`@shellhub-io/admin\` team and a team member can trigger it." || true
          else
            echo "::warning::Team membership check returned HTTP $HTTP_STATUS for $USERNAME"
            echo "authorized=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Acknowledge /review command
        if: github.event_name != 'pull_request_target' && steps.auth-check.outputs.authorized == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REVIEW_ID: ${{ github.event.review.id }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request_review" ]]; then
            gh api "repos/$REPO/pulls/$PR_NUMBER/reviews/$REVIEW_ID/reactions" -f content=eyes
          elif [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            gh api "repos/$REPO/pulls/comments/$COMMENT_ID/reactions" -f content=eyes
          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" -f content=eyes
          else
            echo "::warning::Unexpected event type for acknowledge: $EVENT_NAME"
          fi

      - name: Authorization gate
        id: gate
        if: github.event_name == 'pull_request_target' || steps.auth-check.outputs.authorized == 'true'
        run: echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Clean up previous review comment
        if: steps.gate.outputs.proceed == 'true' && github.event_name != 'pull_request_target'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          MARKER="<!-- claude-code-review -->"
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" \
          | while read -r id; do
            gh api "repos/$REPO/issues/comments/$id" -X DELETE > /dev/null || true
          done

      - name: Determine cloud branch
        id: cloud-branch
        if: steps.gate.outputs.proceed == 'true'
        env:
          HEAD_REF: ${{ github.head_ref || github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -n "$HEAD_REF" ]]; then
            BRANCH="$HEAD_REF"
          else
            BRANCH=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefName --jq '.headRefName') || {
              echo "::warning::Failed to resolve PR head ref name, falling back to master"
              true
            }
            BRANCH="${BRANCH:-master}"
          fi
          if curl -sf -H "Authorization: Bearer $APP_TOKEN" \
            "https://api.github.com/repos/shellhub-io/cloud/branches/$BRANCH" > /dev/null 2>&1; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=master" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout cloud (context)
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/checkout@v7
        with:
          repository: shellhub-io/cloud
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ steps.cloud-branch.outputs.ref }}
          fetch-depth: 1
          path: cloud

      - name: Checkout claude config
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/checkout@v7
        with:
          repository: shellhub-io/claude
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1
          path: claude

      - name: Setup workspace context
        if: steps.gate.outputs.proceed == 'true'
        run: |
          "$GITHUB_WORKSPACE/claude/workspace.sh" sync -w "$GITHUB_WORKSPACE" --project shellhub

      - name: Check PR author team membership
        id: author-check
        if: steps.gate.outputs.proceed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || github.event.issue.user.login }}
        run: |
          # Default to non-admin so continue-on-error failures are fail-closed
          echo "is_admin=false" >> "$GITHUB_OUTPUT"
          HTTP_STATUS=$(gh api orgs/shellhub-io/teams/admin/memberships/"$PR_AUTHOR" \
            --silent -i 2>/dev/null | head -1 | awk '{print $2}') || true
          [[ "$HTTP_STATUS" =~ ^[0-9]+$ ]] || HTTP_STATUS="000"
          if [[ "$HTTP_STATUS" == "200" ]]; then
            echo "is_admin=true" >> "$GITHUB_OUTPUT"
          elif [[ "$HTTP_STATUS" == "404" ]]; then
            echo "is_admin=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Author team membership check returned HTTP $HTTP_STATUS for $PR_AUTHOR"
            echo "is_admin=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code Review
        if: steps.gate.outputs.proceed == 'true'
        timeout-minutes: 30
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          trigger_phrase: "/review"
          prompt: |
            You are the lead reviewer for this PR in shellhub-io/shellhub (Community Edition).

            The cloud/ (enterprise) repo is checked out at $GITHUB_WORKSPACE/cloud/ for context.
            Focus the review on the shellhub diff. Use cloud/ only to understand cross-repo impact.

            ## Step 0: Pre-flight checks

            1. Check if the PR is closed or merged — if so, stop immediately.
            2. Check if the PR is a draft — if so, stop immediately.
            3. For automatic triggers only (not `/review`): check if Claude has already
               commented on this PR — if so, stop to avoid duplicate reviews.

            ## Step 1: Check for existing reviews

            Fetch existing review comments to avoid duplicating feedback:
              gh api repos/shellhub-io/shellhub/pulls/${{ github.event.pull_request.number || github.event.issue.number }}/comments
              gh api repos/shellhub-io/shellhub/pulls/${{ github.event.pull_request.number || github.event.issue.number }}/reviews

            Update the tracking comment via mcp__github_comment__update_claude_comment:

                <!-- claude-code-review -->
                ## Code Review

                - [x] Gathered PR context
                - [ ] Reviewing the diff (parallel workflow)
                - [ ] Posting feedback

            ## Step 2: Run the parallel review with the Workflow tool

            Run the review as a single Workflow that fans out the five review dimensions
            in parallel and then validates each finding. Do NOT use the Task tool and do
            NOT spawn Task sub-agents directly.

            First gather the inputs the workflow needs:
            - PR number: ${{ github.event.pull_request.number || github.event.issue.number }}
            - The unified diff: run
              `gh pr diff ${{ github.event.pull_request.number || github.event.issue.number }}`
              and capture the full output.

            Then call the Workflow tool with the script below, passing
            `args = { "prNumber": <PR number>, "diff": "<the full diff text>" }`.
            The Workflow returns `{ findings: [...] }` already deduplicated and validated.

                export const meta = {
                  name: 'pr-parallel-review',
                  description: 'Review the PR diff across five dimensions in parallel, then validate each finding',
                  phases: [{ title: 'Review' }, { title: 'Validate' }],
                }

                // args may arrive as a JSON string in this runtime — normalize first.
                const A = typeof args === 'string' ? JSON.parse(args) : (args || {})

                const FINDINGS_SCHEMA = {
                  type: 'object', additionalProperties: false, required: ['findings'],
                  properties: { findings: { type: 'array', items: {
                    type: 'object', additionalProperties: false,
                    required: ['file_path', 'line_start', 'line_end', 'severity', 'description', 'suggestion'],
                    properties: {
                      file_path: { type: 'string' },
                      line_start: { type: 'integer' },
                      line_end: { type: 'integer' },
                      severity: { type: 'string', enum: ['critical', 'high', 'medium', 'low'] },
                      description: { type: 'string' },
                      suggestion: { type: 'string', description: 'corrected code, or empty string' },
                    } } } },
                }

                const VERDICT_SCHEMA = {
                  type: 'object', additionalProperties: false,
                  required: ['confirmed', 'confidence', 'reason'],
                  properties: {
                    confirmed: { type: 'boolean' },
                    confidence: { type: 'integer', description: '0-100' },
                    reason: { type: 'string' },
                  },
                }

                const HIGH_SIGNAL = [
                  'CRITICAL: Only flag HIGH SIGNAL issues.',
                  '',
                  'Flag issues where:',
                  '- Code will fail to compile or parse (syntax errors, type errors, missing imports)',
                  '- Code will definitely produce wrong results regardless of inputs (clear logic errors)',
                  '- Clear, unambiguous CLAUDE.md or project convention violations where you can quote the exact rule',
                  '- Code introduces an exploitable security vulnerability (not theoretical)',
                  '- Code will cause data loss, corruption, or undefined behavior',
                  '',
                  'Do NOT flag:',
                  '- Code style/quality concerns, subjective suggestions, or improvements',
                  '- Issues that depend on specific inputs or state',
                  '- Performance concerns unless there is a clear algorithmic regression',
                  '- Suggestions to add comments or documentation',
                  '- Pre-existing issues not introduced in this branch diff',
                  '- Cosmetic formatting or anything a linter/formatter catches (gofmt, eslint, prettier, golangci-lint)',
                  '- Issues silenced by lint-ignore comments (nolint, eslint-disable, etc.)',
                  '- Pedantic nitpicks a senior engineer would not flag; error handling for errors already handled upstream',
                  '',
                  'If you are not certain an issue is real, do not flag it. False positives erode trust.',
                ].join('\n')

                const DIMENSIONS = [
                  { key: 'quality', brief: 'Code Quality: project conventions (CLAUDE.md), dead code, single responsibility, error handling, commit hygiene' },
                  { key: 'security', brief: 'Security: OWASP Top 10 (injection, XSS, CSRF, SSRF), hardcoded secrets, crypto/rand usage, access control, input validation' },
                  { key: 'testing', brief: 'Testing: missing tests for new/changed behavior, edge cases, test determinism, untested error paths' },
                  { key: 'patterns', brief: 'Go/TypeScript Patterns: error wrapping (%w), goroutine leaks, context propagation, minimal interfaces, React patterns (no any, no unnecessary re-renders, Zustand)' },
                  { key: 'architecture', brief: 'Architecture & Cross-repo: if the PR changes pkg/, check $GITHUB_WORKSPACE/cloud/ for impact; API contract changes, interface compatibility, breaking changes' },
                ]

                phase('Review')
                const raw = (await parallel(DIMENSIONS.map((d) => () =>
                  agent(
                    `You are reviewing PR #${A.prNumber} in shellhub-io/shellhub (Community Edition).\n` +
                    `Review dimension — ${d.brief}\n\n` +
                    `Read the actual source files (current dir for shellhub, $GITHUB_WORKSPACE/cloud/ for cloud) ` +
                    `for surrounding context before flagging anything. Report line numbers in the NEW file.\n\n` +
                    `${HIGH_SIGNAL}\n\nThe PR diff:\n${A.diff}`,
                    { label: `review:${d.key}`, phase: 'Review', schema: FINDINGS_SCHEMA },
                  )
                ))).filter(Boolean).flatMap((r) => r.findings)

                // Deduplicate: same file + same line range + same description.
                const seen = new Set()
                const deduped = raw.filter((f) => {
                  const k = `${f.file_path}:${f.line_start}-${f.line_end}:${f.description}`
                  if (seen.has(k)) return false
                  seen.add(k)
                  return true
                })

                phase('Validate')
                const validated = await parallel(deduped.map((f) => () =>
                  agent(
                    `Validate this code-review finding against the real source. Read the file at the ` +
                    `reported location with surrounding context.\n` +
                    `Confirm it is real (not a misreading, not pre-existing, not assumption-dependent) AND ` +
                    `introduced in this PR's diff. If a suggestion is given, confirm it compiles and adds no new issue.\n` +
                    `Set confirmed=false or confidence<80 if unsure.\n\nFinding: ${JSON.stringify(f)}`,
                    { label: `validate:${f.file_path}:${f.line_start}`, phase: 'Validate', schema: VERDICT_SCHEMA },
                  ).then((v) => ({ ...f, validation: v }))
                ))

                const confirmed = validated
                  .filter(Boolean)
                  .filter((x) => x.validation.confirmed && x.validation.confidence >= 80)
                  .map(({ validation, ...f }) => f)

                return { findings: confirmed }

            If the Workflow surfaces more than 10 confirmed findings, re-check that the
            high-signal filter was applied correctly before posting.

            ## Step 3: Reconcile with existing reviews

            Take the `findings` returned by the Workflow. Compare them against the existing
            review comments fetched in Step 1 and drop any already reported on the same file
            and line. If the same logical issue appears at multiple locations, keep the first
            occurrence and list the rest in its body:
            "Same issue also at: `path/file.go:42`, `path/other.go:87`".

            Update the tracking comment via mcp__github_comment__update_claude_comment:

                <!-- claude-code-review -->
                ## Code Review

                - [x] Gathered PR context
                - [x] Reviewed the diff (parallel workflow)
                - [ ] Posting feedback

            ## Step 4: Post inline comments

            For each remaining finding, post an inline comment using
            mcp__github_inline_comment__create_inline_comment on the specific file and line.

            When a fix is available, include a GitHub suggestion block:
            ```suggestion
            corrected code here
            ```

            When posting suggestions:
            - Only use suggestion blocks for small, self-contained fixes (5 lines or fewer)
            - For 6+ lines or structural changes, describe the fix without a suggestion block
            - Never post a suggestion that requires changes in multiple locations to be correct
            - Every suggestion must be directly committable — it must compile as-is

            Do NOT re-report issues that already exist in previous review threads.

            After posting all inline comments, update the tracking comment via mcp__github_comment__update_claude_comment:

                <!-- claude-code-review -->
                ## Code Review

                - [x] Gathered PR context
                - [x] Code review complete
                - [x] Posted inline comments
                - [ ] Finalizing summary

            ## Step 5: Update final summary

            After Step 4 is complete, update the tracking comment one final time via
            mcp__github_comment__update_claude_comment to become the closing summary.

            When mentioning `/review` in any comment, always wrap it in backticks (`` `/review` ``).

            The PR author ${{ steps.author-check.outputs.is_admin == 'true' && 'IS' || 'is NOT' }} a member of the shellhub-io/admin team.

            ### If there are findings:

            Update the tracking comment to:

                <!-- claude-code-review -->
                ## Code Review Complete

                Reviewed N files. **X inline issues** posted (breakdown by severity).

                ### Additional notes
                (Only if there are non-inlinable findings — architectural concerns,
                missing files, cross-cutting issues not tied to specific lines.
                Omit this section entirely if all findings were posted inline.)

                ---
                {For admin authors:}
                To request another review round, comment `/review`.
                {For non-admin authors:}
                If you've addressed the feedback and want a new review, tag
                `@shellhub-io/admin` and a team member can trigger it.

            ### If there are NO findings:

            Update the tracking comment to:

                <!-- claude-code-review -->
                ## Code Review Complete

                Reviewed N files across code quality, security, testing, language patterns,
                and architecture — no issues found. The code looks good as-is.

                {For non-admin authors only:}
                If you push additional changes and want a new review, tag
                `@shellhub-io/admin` and a team member can trigger it.

            Do NOT mention inline comments or `/review` follow-up when there are no findings
            (unless the author is non-admin, in which case include the tag guidance).

            In both cases, always update the tracking comment. Never skip Step 5.

          claude_args: |
            --max-turns 50
            --model claude-opus-4-6
            --allowedTools "Workflow" "mcp__github_inline_comment__create_inline_comment" "mcp__github_comment__update_claude_comment" "Bash(gh api:*)" "Bash(gh pr diff:*)"
