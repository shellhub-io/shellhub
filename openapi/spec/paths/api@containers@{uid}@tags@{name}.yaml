post:
  operationId: pushTagToContainer
  summary: Add a tag to a container
  description: Add a tag to a container.
  tags:
    - community
    - tags
  security:
    - jwt: []
    - api-key: []
  parameters:
    - $ref: ../components/parameters/path/deviceUIDPath.yaml
    - $ref: ../components/parameters/path/tagNamePath.yaml
  responses:
    '204':
      description: Tag successfully associated with container
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
delete:
  operationId: pullTagFromContainer
  summary: Remove a tag from a container
  description: Remove a tag from a container.
  tags:
    - community
    - tags
  security:
    - jwt: []
    - api-key: []
  parameters:
    - $ref: ../components/parameters/path/deviceUIDPath.yaml
    - $ref: ../components/parameters/path/tagNamePath.yaml
  responses:
    '204':
      description: Tag successfully removed from container
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
