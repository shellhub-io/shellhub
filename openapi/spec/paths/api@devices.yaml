get:
  operationId: getDevices
  summary: List devices
  description: |-
    List devices.

    **Deprecated filter field names.** The `filter` parameter still accepts the
    legacy Mongo-style field names `info.platform` and `identity.mac`, which are
    duplicates of `platform` and `mac` respectively. These aliases are kept for
    backward compatibility and will be removed in the next major API version.
    Update integrations to use the flat names (`platform`, `mac`).
  tags:
    - community
    - devices
  security:
    - jwt: []
    - api-key: []
  parameters:
    - $ref: ../components/parameters/query/filterQuery.yaml
    - $ref: ../components/parameters/query/pageQuery.yaml
    - $ref: ../components/parameters/query/perPageQuery.yaml
    - name: status
      description: Device's status
      schema:
        allOf:
          - $ref: ../components/schemas/deviceStatus.yaml
        default: accepted
      required: false
      in: query
    - name: sort_by
      description: Device's property to sort of
      schema:
        type: string
        example: name
        default: last_seen
      required: false
      in: query
    - name: order_by
      schema:
        description: Device's list order
        type: string
        enum:
          - asc
          - desc
        example: asc
        default: desc
      required: false
      in: query
  responses:
    '200':
      description: Success to get a list of devices.
      headers:
        X-Total-Count:
          $ref: ../components/headers/XTotalCount.yaml
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/device.yaml
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '500':
      $ref: ../components/responses/500.yaml
