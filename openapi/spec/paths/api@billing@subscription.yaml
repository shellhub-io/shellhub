post:
  operationId: createSubscription
  summary: Create subscription
  description: Create a subscription.
  security:
    - jwt: []
    - api-key: []
  tags:
    - cloud
    - billing
  responses:
    '200':
      description: Success to create a new subscription.
    '400':
      $ref: ../components/schemas/billingError.yaml
    '402':
      $ref: ../components/schemas/billingError.yaml
    '403':
      $ref: ../components/schemas/billingError.yaml
    '404':
      $ref: ../components/schemas/billingError.yaml
    '409':
      $ref: ../components/schemas/billingError.yaml
    '424':
      $ref: ../components/schemas/billingError.yaml
    '500':
      $ref: ../components/responses/500.yaml
get:
  operationId: getSubscription
  summary: Get subscription
  description: Get the subscription.
  security:
    - jwt: []
    - api-key: []
  tags:
    - cloud
    - billing
  responses:
    '200':
      description: Success to get a subscription.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/subscription.yaml
    '402':
      $ref: ../components/schemas/billingError.yaml
    '403':
      $ref: ../components/schemas/billingError.yaml
    '404':
      $ref: ../components/schemas/billingError.yaml
    '424':
      $ref: ../components/schemas/billingError.yaml
    '500':
      $ref: ../components/responses/500.yaml
