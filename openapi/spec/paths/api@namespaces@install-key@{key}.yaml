patch:
  summary: Update a install key
  operationId: installKeyUpdate
  tags:
    - install-keys
    - community
    - namespaces
  security:
    - jwt: []
  parameters:
    - name: key
      schema:
        type: string
        description: The install key name.
        example: ci-runners
      required: true
      in: path
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/installKeyUpdate.yaml
  responses:
    '200':
      description: Success
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '409':
      $ref: ../components/responses/409.yaml
    '500':
      $ref: ../components/responses/500.yaml
