post:
  operationId: setup
  summary: User setup
  description: Register the admin user and create the instance namespace.
  security: []
  tags:
    - community
    - system
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              $ref: ../components/schemas/userName.yaml
            email:
              $ref: ../components/schemas/userEmail.yaml
            username:
              $ref: ../components/schemas/userUsername.yaml
            password:
              $ref: ../components/schemas/userPassword.yaml
            namespace:
              $ref: ../components/schemas/namespaceName.yaml
          required:
            - name
            - email
            - username
            - password
            - namespace
  responses:
    '200':
      description: Success to register user on setup.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/userAuth.yaml
    '409':
      $ref: ../components/responses/409.yaml
    '400':
      $ref: ../components/responses/400.yaml
    '500':
      $ref: ../components/responses/500.yaml
