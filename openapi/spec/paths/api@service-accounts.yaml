get:
  operationId: listServiceAccounts
  summary: List service accounts
  description: |
    List the namespace's service accounts and their enrolled SSH identities.
    Requires the `NamespaceAddMember` permission (owner/admin).
  tags:
    - community
    - service-accounts
  security:
    - jwt: []
  responses:
    '200':
      description: Success to list service accounts.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/serviceAccount.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '500':
      $ref: ../components/responses/500.yaml
post:
  operationId: createServiceAccount
  summary: Create a service account
  description: |
    Create a service account from a name and an SSH public key. The key is
    enrolled as the account's first identity. Requires the `NamespaceAddMember`
    permission (owner/admin).
  tags:
    - community
    - service-accounts
  security:
    - jwt: []
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/serviceAccountRequest.yaml
  responses:
    '200':
      description: Success to create a service account.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/serviceAccount.yaml
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '409':
      $ref: ../components/responses/409.yaml
    '500':
      $ref: ../components/responses/500.yaml
