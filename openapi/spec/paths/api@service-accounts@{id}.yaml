parameters:
  - $ref: ../components/parameters/path/serviceAccountIDPath.yaml
delete:
  operationId: deleteServiceAccount
  summary: Delete a service account
  description: |
    Delete a service account. This also removes its membership and every SSH
    identity it holds. Requires the `NamespaceAddMember` permission (owner/admin).
  tags:
    - community
    - service-accounts
  security:
    - jwt: []
  responses:
    '200':
      description: Success to delete a service account.
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
