get:
  operationId: listNamespaceMembers
  summary: List members
  description: |
    Lists the members of a namespace with their full identity (name, username,
    email), role and a flattened account status. In cloud and enterprise
    instances the list also folds in pending invitations (members whose invitee
    has not completed their account yet).
  tags:
    - community
    - members
    - namespaces
  security:
    - jwt: []
  parameters:
    - $ref: ../components/parameters/path/namespaceTenantIDPath.yaml
    - $ref: ../components/parameters/query/pageQuery.yaml
    - $ref: ../components/parameters/query/perPageQuery.yaml
  responses:
    '200':
      description: Success to get the list of namespace members.
      headers:
        X-Total-Count:
          $ref: ../components/headers/XTotalCount.yaml
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/memberView.yaml
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '500':
      $ref: ../components/responses/500.yaml

delete:
  operationId: leaveNamespace
  summary: Leave Namespace
  description: |
    Allows the authenticated user to leave the specified namespace. Owners
    cannot leave a namespace; they must delete it instead. If the user attempts
    to leave their current authenticated namespace, the response will provide a
    new token that excludes this namespace.
  tags:
    - community
    - members
    - namespaces
  security:
    - jwt: []
  parameters:
    - $ref: ../components/parameters/path/namespaceTenantIDPath.yaml
  responses:
    '200':
      description: Successfully left the namespace.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/userAuth.yaml
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '500':
      $ref: ../components/responses/500.yaml
post:
  operationId: addNamespaceMember
  summary: Invite member
  description: |
    Adds a member to a namespace.

    In enterprise and community instances, if the email already has an
    account the member is added directly. If the email has no account yet,
    a profile-less pending account is provisioned and a one-time activation
    link is generated; the invitee completes their own profile (name,
    username, password) through that link (see `/api/users/{id}/activate`).

    In cloud instances, an invitation email is sent to the member.
    The invite is valid for **7 days**. If the member was previously invited
    and the invite is no longer valid, the same route will resend the invite.
  tags:
    - community
    - members
    - namespaces
  security:
    - jwt: []
  parameters:
    - $ref: ../components/parameters/path/namespaceTenantIDPath.yaml
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            email:
              description: The email of the member.
              type: string
              example: john.doe@test.com
            role:
              $ref: ../components/schemas/namespaceMemberRole.yaml
          required:
            - email
            - role
  responses:
    '200':
      description: Success to add a member to a namespace.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/namespace.yaml
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '409':
      $ref: ../components/responses/409.yaml
    '500':
      $ref: ../components/responses/500.yaml
