parameters:
  - name: id
    schema:
      description: Team connection's ID.
      type: string
    in: path
    required: true
get:
  operationId: getTeamConnectionPrefs
  summary: Get your team connection auth preference
  description: Return the caller's own auth preference (empty when none saved yet).
  tags:
    - connections
  security:
    - jwt: []
    - api-key: []
  responses:
    '200':
      description: Success to get the auth preference.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/teamConnectionPrefs.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '402':
      $ref: ../components/responses/402.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
put:
  operationId: updateTeamConnectionPrefs
  summary: Save your team connection auth preference
  description: Save the caller's own auth preference for a team connection.
  tags:
    - connections
  security:
    - jwt: []
    - api-key: []
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/teamConnectionPrefsRequest.yaml
  responses:
    '200':
      description: Success to save the auth preference.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/teamConnectionPrefs.yaml
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '402':
      $ref: ../components/responses/402.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
