openapi: 3.0.3
info:
  title: ShellHub OpenAPI
  description: |
    Full reference for the ShellHub Community API, covering public, internal,
    and service-to-service routes. This is the internal source of truth used for
    client generation and response validation; the customer-facing documentation
    is a filtered build that exposes only the namespace-scoped, API-key usable
    surface.
  contact:
    name: ShellHub
    email: contact@shellhub.io
  license:
    name: Apache License 2.0
    url: https://github.com/shellhub-io/shellhub/blob/master/LICENSE.md
  version: 0.20.0
servers:
  - url: /
    description: ShellHub server.
components:
  securitySchemes:
    $ref: ./components/schemas/security.yaml
tags:
  - name: devices
    x-displayName: Devices
    description: List, inspect, accept, reject, rename, and delete devices, and manage their custom fields.
  - name: containers
    x-displayName: Containers
    description: List and manage containers, which are devices running inside containers.
  - name: sessions
    x-displayName: Sessions
    description: List and inspect SSH sessions.
  - name: public-keys
    x-displayName: SSH Public Keys
    description: Register and manage SSH public keys.
  - name: tags
    x-displayName: Tags
    description: Create tags and attach them to devices.
  - name: namespaces
    x-displayName: Namespace
    description: Inspect the namespace and manage its settings.
  - name: stats
    x-displayName: Statistics
    description: Aggregate statistics for the namespace, such as device and session counts.
  - name: users
    x-displayName: Users
    description: User-scoped namespace security settings.
  - name: internal
    description: Requests executed internally by ShellHub server.
  - name: external
    description: Requests executed by the ShellHub user.
  - name: system
    description: Routes related to running instance.
  - name: api-keys
    description: |
      An API key is a unique identifier used to access protected endpoints. It
      has a defined lifespan, is associated with a namespace, and cannot be
      used to authenticate user routes. Typically, it replaces login-based
      authentication when automating processes.

      To utilize an API key, it must be included in the `X-API-KEY` header. API
      keys are preferred over JWT tokens and will be used even if one is
      provided.

      Except for `GET` endpoints, API key-related routes cannot be
      authenticated with an API key.

