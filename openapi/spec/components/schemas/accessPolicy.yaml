description: |
  An access policy either grants (action allow) or blocks (action deny) a
  subject (user, role, or all members) reaching a set of devices as a set of
  unix logins, under the identity SSH access mode. Evaluation is default-deny
  and deny-first: a matching deny wins over any allow.
type: object
properties:
  id:
    description: Access policy's ID.
    type: string
    format: uuid
  name:
    description: Access policy's name.
    type: string
    example: Default access
  subject:
    $ref: accessPolicySubject.yaml
  filter:
    $ref: accessPolicyFilterResponse.yaml
  logins:
    $ref: accessPolicyLogins.yaml
  source_ip:
    description: |
      CIDRs the connection's client IP must fall within for the policy to apply
      (a client IP in any of them matches). Empty matches any IP; a single host
      is a /32 (or /128 for IPv6).
    type: array
    items:
      type: string
      example: 10.0.0.0/8
  action:
    description: |
      Whether the policy grants (allow) or blocks (deny) the covered access.
      Deny is evaluated first and wins over any allow.
    type: string
    enum:
      - allow
      - deny
    default: allow
    example: allow
  require_reauth:
    description: |
      Whether a recognized key must still complete a fresh per-session
      re-authentication before the session proceeds under the identity SSH
      access mode.
    type: boolean
    example: false
  reauth_period:
    description: |
      Freshness window for `require_reauth`, in seconds: a re-authentication is
      only demanded when the identity has not re-authed within it. Null or 0
      means "always" (every session). Only meaningful when `require_reauth` is
      true.
    type: integer
    nullable: true
    example: 43200
  created_at:
    description: Access policy's creation date.
    type: string
    format: date-time
    example: 2026-01-01T00:00:00.000Z
  updated_at:
    description: Access policy's last update date.
    type: string
    format: date-time
    example: 2026-01-01T00:00:00.000Z
required:
  - id
  - name
  - subject
  - filter
  - logins
  - source_ip
  - action
  - require_reauth
  - created_at
  - updated_at
