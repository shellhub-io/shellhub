type: object
description: Payload to update a personal connection.
properties:
  label:
    type: string
    example: db-primary
  kind:
    type: string
    enum:
      - external
      - device
    example: external
  host:
    type: string
    example: 10.0.0.5
  port:
    type: integer
    example: 22
  device_uid:
    type: string
    example: a1b2c3d4
  username:
    type: string
    example: root
  auth_method:
    type: string
    example: key
  key_fingerprint:
    type: string
    example: SHA256:abcd
required:
  - label
  - kind
