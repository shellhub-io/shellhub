type: object
properties:
  action:
    description: Firewall rule's action
    type: string
    enum:
      - allow
      - deny
    example: allow
  active:
    description: Firewall rule active's status
    type: boolean
    example: true
  filter:
    description: Firewall rule's filter
    oneOf:
      - type: object
        properties:
          hostname:
            description: Firewall rule's hostname
            type: string
            example: .*
        required:
          - hostname
      - type: object
        properties:
          tags:
            $ref: tagNameArray.yaml
        required:
          - tags
  priority:
    description: Firewall rule's priority
    type: integer
    minimum: 0
    example: 1
  source_ip:
    description: Firewall rule's source IP regexp
    type: string
    example: .*
  username:
    description: Firewall rule's username regexp
    type: string
    example: .*
required:
  - action
  - active
  - filter
  - priority
  - source_ip
  - username
