type: object
properties:
  uid:
    $ref: deviceUID.yaml
  name:
    description: |
      Device's name


      By default, the name is the device's MAC address when it just added.
    type: string
    example: example
  identity:
    $ref: deviceIdentity.yaml
  info:
    description: Device's info
    $ref: deviceInfo.yaml
  public_key:
    description: Device's public key.
    type: string
    example: '-----BEGIN RSA PUBLIC KEY----------END RSA PUBLIC KEY-----'
  tenant_id:
    $ref: namespaceTenantID.yaml
  last_seen:
    description: Device's last seen date
    type: string
    format: date-time
    example: 2020-01-01T00:00:00Z
  online:
    description: Device's availability status
    type: boolean
    example: true
  namespace:
    description: Device's namespace
    $ref: namespaceName.yaml
  status:
    $ref: deviceStatus.yaml
  status_update_at:
    $ref: deviceUpdateAt.yaml
  created_at:
    description: Device's creation date
    type: string
    format: date-time
    example: 2020-01-01T00:00:00Z
  remote_addr:
    description: Device's remote address
    type: string
    example: 127.0.0.1
  position:
    description: Device's geolocation position
    type: object
    properties:
      latitude:
        description: Device's latitude position
        type: number
        example: -31.7566628
      longitude:
        description: Device's longitude position
        type: number
        example: -52.322474
  tags:
    $ref: deviceTags.yaml
  settings:
    description: Device's SSH configuration settings
    type: object
    properties:
      allow_password:
        description: Allow password authentication
        type: boolean
        example: true
      allow_public_key:
        description: Allow public key authentication
        type: boolean
        example: true
      allow_root:
        description: Allow root user login
        type: boolean
        example: true
      allow_empty_passwords:
        description: Allow empty passwords
        type: boolean
        example: false
      allow_tty:
        description: Allow TTY allocation
        type: boolean
        example: true
      allow_tcp_forwarding:
        description: Allow TCP port forwarding
        type: boolean
        example: true
      allow_web_endpoints:
        description: Allow web endpoints access via HTTP proxy
        type: boolean
        example: true
      allow_sftp:
        description: Allow SFTP subsystem
        type: boolean
        example: true
      allow_agent_forwarding:
        description: Allow SSH agent forwarding
        type: boolean
        example: false
  public_url:
    $ref: devicePublicURL.yaml
  acceptable:
    $ref: deviceAcceptable.yaml
required:
  - uid
  - name
  - status
  - online
  - tenant_id
  - created_at
  - last_seen
