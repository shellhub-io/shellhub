type: object
description: A saved SSH connection (personal address-book entry).
properties:
  id:
    description: Connection's ID.
    type: string
    example: 3b8c2f1e-1d2a-4c5b-8e9f-0a1b2c3d4e5f
  tenant_id:
    $ref: namespaceTenantID.yaml
  owner_id:
    description: The user the connection belongs to.
    type: string
    example: 507f1f77bcf86cd799439011
  label:
    description: Human-friendly name for the connection.
    type: string
    example: db-primary
  kind:
    description: How the connection reaches its target.
    type: string
    enum:
      - external
      - device
    example: external
  host:
    description: Dial host for an external connection.
    type: string
    example: 10.0.0.5
  port:
    description: Dial port for an external connection.
    type: integer
    example: 22
  device_uid:
    description: Target device UID for a device connection.
    type: string
    example: a1b2c3d4
  username:
    description: OS username to authenticate as.
    type: string
    example: root
  auth_method:
    description: Saved authentication method ("password" or "key"; empty when none).
    type: string
    example: key
  key_fingerprint:
    description: Pointer to the SSH key in the owner's vault (never the secret).
    type: string
    example: SHA256:abcd
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
required:
  - id
  - tenant_id
  - owner_id
  - label
  - kind
  - host
  - port
  - device_uid
  - username
  - auth_method
  - key_fingerprint
  - created_at
  - updated_at
