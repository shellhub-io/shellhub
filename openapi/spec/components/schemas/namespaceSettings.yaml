description: Namespace's settings.
type: object
properties:
  session_record:
    description: The session records define when the namespace should save or not record a session. This can be used to check logged activity when connecting to a device.
    type: boolean
    example: true
  connection_announcement:
    description: A connection announcement is a custom string written during a session when a connection is established on a device within the namespace.
    type: string
    minLength: 0
    maxLength: 4096
    format: alphanumunicode
    example: my awesome connection announcement
  ssh_access_mode:
    description: |
      The SSH access model governing the namespace.

      - `legacy` — access is a public key with an ACL (and, on Cloud/Enterprise, firewall rules).
      - `identity` — SSH logins go through browser approval and are authorized by Access Policies.
    type: string
    enum:
      - legacy
      - identity
    default: identity
    example: identity
  ssh_legacy_allowed:
    description: |
      Whether the namespace may switch the SSH access mode to `legacy`. Only
      namespaces that predate identity-first (grandfathered) have it `true`;
      namespaces born in identity mode can never leave it. Server-controlled.
    type: boolean
    readOnly: true
    default: false
    example: false
required:
  - session_record
  - connection_announcement
  - ssh_access_mode
  - ssh_legacy_allowed
