jwt:
  type: http
  scheme: bearer
  bearerFormat: JWT
  description: JSON Web Token for authentication.
api-key:
  type: apiKey
  in: header
  name: X-API-KEY
  description: |
    Send your API key in the `X-API-KEY` header. An API key belongs to a single
    namespace and is not tied to a user. Create one in the ShellHub console under
    **Namespace → API Keys**.
