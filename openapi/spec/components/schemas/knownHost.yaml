type: object
description: A trusted SSH host key (trust-on-first-use) for an external target.
properties:
  id:
    type: string
    example: 3b8c2f1e-1d2a-4c5b-8e9f-0a1b2c3d4e5f
  tenant_id:
    $ref: namespaceTenantID.yaml
  owner_id:
    description: Set for a personal (per-user) known host; empty for a namespace-shared one.
    type: string
    example: 507f1f77bcf86cd799439011
  host:
    type: string
    example: 10.0.0.5
  port:
    type: integer
    example: 22
  key_type:
    description: Host key algorithm.
    type: string
    example: ssh-ed25519
  public_key:
    description: Host key in authorized_keys format.
    type: string
    example: ssh-ed25519 AAAAC3Nz...
  fingerprint:
    description: SHA256 fingerprint of the host key.
    type: string
    example: SHA256:abcd
  accepted_by:
    description: User who accepted the key (audit).
    type: string
    example: 507f1f77bcf86cd799439011
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
required:
  - id
  - tenant_id
  - owner_id
  - host
  - port
  - key_type
  - public_key
  - fingerprint
  - accepted_by
  - created_at
  - updated_at
