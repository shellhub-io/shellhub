description: Service account creation payload.
type: object
properties:
  name:
    description: User-supplied name for the service account.
    type: string
    example: ci-bot
  data:
    description: |
      The SSH public key to enroll as the service account's first identity, in
      OpenSSH `authorized_keys` format.
    type: string
    example: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILqk ci-bot
required:
  - name
  - data
