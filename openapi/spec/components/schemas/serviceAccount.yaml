description: |
  A service account: a non-human principal for automated systems (CI, backups,
  config management). It holds one or more SSH identities for the identity SSH
  access mode, never signs in to the console, and is not an API principal.
type: object
properties:
  id:
    description: Service account's ID.
    type: string
    format: uuid
  name:
    description: User-supplied name for the service account.
    type: string
    example: ci-bot
  created_at:
    description: When the service account was created.
    type: string
    format: date-time
    example: 2026-01-01T00:00:00.000Z
  identities:
    description: The SSH identities enrolled for this service account.
    type: array
    items:
      $ref: sshIdentity.yaml
required:
  - id
  - name
  - created_at
  - identities
