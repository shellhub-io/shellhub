type: object
description: A member's personal auth preference for a team connection.
properties:
  team_connection_id:
    type: string
    example: 3b8c2f1e-1d2a-4c5b-8e9f-0a1b2c3d4e5f
  user_id:
    type: string
    example: 507f1f77bcf86cd799439011
  username:
    type: string
    example: root
  auth_method:
    type: string
    example: key
  key_fingerprint:
    type: string
    example: SHA256:abcd
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
required:
  - team_connection_id
  - user_id
  - username
  - auth_method
  - key_fingerprint
