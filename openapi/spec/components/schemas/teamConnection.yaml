type: object
description: A saved SSH connection shared with every member of a namespace.
properties:
  id:
    type: string
    example: 3b8c2f1e-1d2a-4c5b-8e9f-0a1b2c3d4e5f
  tenant_id:
    $ref: namespaceTenantID.yaml
  created_by:
    description: User that created the connection (audit; does not gate visibility).
    type: string
    example: 507f1f77bcf86cd799439011
  label:
    type: string
    example: db-primary
  kind:
    type: string
    enum:
      - external
      - device
    example: external
  host:
    type: string
    example: 10.0.0.5
  port:
    type: integer
    example: 22
  device_uid:
    type: string
    example: a1b2c3d4
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
required:
  - id
  - tenant_id
  - created_by
  - label
  - kind
  - host
  - port
  - device_uid
  - created_at
  - updated_at
