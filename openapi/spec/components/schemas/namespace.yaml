type: object
properties:
  name:
    $ref: namespaceName.yaml
  owner:
    $ref: userID.yaml
  tenant_id:
    $ref: namespaceTenantID.yaml
  members:
    description: Namespace's members
    type: array
    items:
      type: object
      properties:
        id:
          $ref: userID.yaml
        added_at:
          type: string
          format: date-time
          description: The time when the member was added.
          example: 2024-09-03T23:17:50.51Z
        role:
          allOf:
            - $ref: namespaceMemberRole.yaml
          default: owner
        email:
          type: string
          description: Member's email.
          example: john.doe@test.com
        account_status:
          type: string
          enum:
            - confirmed
            - not-confirmed
          description: >-
            The member's underlying user account status. A not-confirmed
            member was provisioned inline and still has to complete their
            account through an activation link.
          example: not-confirmed
        awaiting_approval:
          type: boolean
          description: >-
            True while a namespace admin provisioned the member but a system
            admin has not approved the account yet. The activation link cannot
            be minted until an admin approves.
          example: true
  settings:
    type: object
    nullable: true
    allOf:
      - $ref: namespaceSettings.yaml
  max_devices:
    description: Namespace's max device numbers
    type: integer
    minimum: -1
    default: 3
  created_at:
    description: Namespace's creation date
    type: string
    format: date-time
    example: 2020-05-01T00:00:00.000Z
  billing:
    type: object
    nullable: true
    allOf:
      - $ref: namespaceBilling.yaml
  devices_pending_count:
    description: Number of devices currently in pending status awaiting approval
    type: integer
    minimum: 0
    example: 2
  devices_accepted_count:
    description: Number of devices that have been accepted and are active in the namespace
    type: integer
    minimum: 0
    example: 23
  devices_rejected_count:
    description: Number of devices that have been explicitly rejected from the namespace
    type: integer
    minimum: 0
    example: 0
  type:
    type: string
    enum:
      - personal
      - team
    default: personal
    description: |
      this field, on majority of cases is default 'personal', if the running
      instance of shellhub is cloud, the default value is 'team'.
      This field requires a valid input of either 'personal' or 'team'. the default
      will match the current Shellhub instance type. When a "type" field value is
      specified, it will override the default, but must be either 'personal' or 'team'.
      Any other input will be rejected.
    example: team
required:
  - name
  - owner
  - tenant_id
  - members
  - settings
  - max_devices
  - created_at
  - billing
  - devices_pending_count
  - devices_accepted_count
  - devices_rejected_count
