type: object
properties:
  id:
    $ref: userID.yaml
  namespaces:
    description: User's integer of owned namespaces.
    type: integer
    minimum: 0
  status:
    description: User's account status.
    type: string
    enum: [confirmed, not-confirmed]
  admin:
    description: User's admin status.
    type: boolean
  max_namespaces:
    description: Maximum number of namespaces the user can own.
    type: integer
  email_marketing:
    description: Whether the user has opted in to marketing emails.
    type: boolean
  created_at:
    description: User's creating date.
    type: string
    format: date-format
  last_login:
    description: User's last login date.
    type: string
    format: date-format
  name:
    $ref: userName.yaml
  email:
    $ref: userEmail.yaml
  username:
    $ref: userUsername.yaml
  password:
    description: User's hashed password.
    type: string
    minLength: 64
    maxLength: 64
required:
  - id
  - status
  - admin
  - created_at
  - last_login
  - name
  - email
  - username
