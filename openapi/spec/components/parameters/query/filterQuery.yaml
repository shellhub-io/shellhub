name: filter
description: |
  Filter field receives a JSON object encoded as a base64url string (URL-safe, unpadded, RFC 4648 §5) to limit a search. Standard base64 is also accepted for backward compatibility.

  The JSON enconded must follow these interafaces:
  ```typescript
  interface ParamProperty {
    name: string;
    operator: "contains" | "eq" | "bool" | "gt" | "lt";
    value: string;
  }

  interface ParamOperator {
    name: "and" | "or";
  }

  interface Filter {
    type: "property" | "operator";
    param: ParamOperator | ParamProperty;
  }

  interface FilterList {
    Filters: Array<Filter>;
  }

  ```

  ## Examples

  This is a example to filter and get only the resource what property "confirmed" is "true"
  ```json
  [
    {
    "type": "property",
    "params": {
        "name": "confirmed",
        "operator": "bool",
        "value": "true"
        }
    }
  ]
  ```

  This one filters the resource by the "platform" property when it is equal to "manjaro" and the online property is set to "true"
  ```json
  [
    {
      "type": "property",
      "params": {
        "name": "platform",
        "operator": "eq",
        "value": "manjaro"
      }
    },
    {
      "type": "property",
      "params": {
        "name": "online",
        "operator": "bool",
        "value": "true"
      }
    },
    {
      "type": "operator",
      "params": {
        "name": "and"
      }
    }
  ]
  ```
schema:
  type: string
  format: byte
required: false
in: query
