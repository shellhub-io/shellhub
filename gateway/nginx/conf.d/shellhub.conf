{{ $cfg := .Config }}

lua_shared_dict dns_cache 128k;

limit_req_zone $binary_remote_addr zone=api_limit:{{ $cfg.APIRateLimitZoneSize }} rate={{ $cfg.APIRateLimit }};
# Dedicated tight limit for pairing accept: guards a short pairing-code guess
# against brute-force, well below the global api_limit. Accept is a one-shot
# user action, so 30 req/min per IP is generous for humans and hostile to a
# guesser.
limit_req_zone $binary_remote_addr zone=pairing_limit:1m rate=30r/m;
limit_req_status 429;

{{ $api_burst := "" }}
{{ if $cfg.APIBurstSize }}
    {{ $api_burst = printf "burst=%s" $cfg.APIBurstSize }}
{{ end }}

{{ $api_delay := "nodelay" }}
{{ if ne $cfg.APIBurstDelay "nodelay" }}
    {{ $api_delay = printf "delay=%s" $cfg.APIBurstDelay }}
{{ end }}

server {
    {{ if and ($cfg.EnableAutoSSL) (ne $cfg.Env "development") -}}
    listen 443 reuseport ssl{{ if $cfg.EnableProxyProtocol }} proxy_protocol{{ end }} backlog={{ $cfg.BacklogSize }};
    ssl_certificate /etc/letsencrypt/live/{{ $cfg.Domain }}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{ $cfg.Domain }}/privkey.pem;

    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    ssl_dhparam /etc/shellhub-gateway/dhparam.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    {{ else -}}
    listen 80 reuseport{{ if $cfg.EnableProxyProtocol }} proxy_protocol{{ end }} backlog={{ $cfg.BacklogSize }};
    {{- end }}
    {{ if $cfg.EnableProxyProtocol }}
    set_real_ip_from ::/0;
    real_ip_header proxy_protocol;
    {{ end }}
    server_name {{ $cfg.Domain }};
    server_tokens off;
    absolute_redirect off;
    resolver 127.0.0.11 valid=10s ipv6=off;

    {{ if eq $cfg.Database "migrate" }}

    location /healthcheck {
        default_type text/plain;
        return 200 "OK";
    }

    location = / {
        return 302 /migrate.html;
    }

    location /api/migration/ {
        set $upstream api:8080;

        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }

    location / {
        set $upstream ui:8080;

        add_header Cache-Control "no-cache, no-store";
        add_header Pragma "no-cache";

        proxy_pass http://$upstream;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }

    {{ else }}

    {{ if not $cfg.EnableCloud }}

    location = /api/setup {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$upstream;
    }

    {{ end }}

    location /healthcheck {
        set $upstream api:8080;
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $x_forwarded_port;
        proxy_http_version 1.1;
        proxy_pass http://$upstream;
        rewrite ^/(.*)$ /api/healthcheck break;
    }

    location /v1/ {
        return 301 /;
    }

    location / {
        set $upstream ui:8080;

        add_header Cache-Control "no-cache, no-store";
        add_header Pragma "no-cache";

        proxy_pass http://$upstream;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /etc/letsencrypt;
    }

    location ^~ /mcp {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $api_key $upstream_http_x_api_key;
        auth_request_set $role $upstream_http_x_role;
        error_page 500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $x_forwarded_port;
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
        proxy_set_header X-Api-Key $api_key;
        proxy_set_header X-Role $role;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_pass http://$upstream;
    }

    location /api {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $username $upstream_http_x_username;
        auth_request_set $id $upstream_http_x_id;
        auth_request_set $api_key $upstream_http_x_api_key;
        auth_request_set $role $upstream_http_x_role;
        auth_request_set $admin $upstream_http_x_admin;
        error_page 500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $x_forwarded_port;
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
        proxy_set_header X-Api-Key $api_key;
        proxy_set_header X-ID $id;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Role $role;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Username $username;
        proxy_set_header X-Admin $admin;
        proxy_pass http://$upstream;
    }

    location /api/user {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request       /auth;
        auth_request_set   $tenant_id $upstream_http_x_tenant_id;
        auth_request_set   $username $upstream_http_x_username;
        auth_request_set   $id $upstream_http_x_id;
        auth_request_set   $api_key $upstream_http_x_api_key;
        auth_request_set   $role $upstream_http_x_role;
        error_page         500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   X-Api-Key $api_key;
        proxy_set_header   X-ID $id;
        proxy_set_header   X-Request-ID $request_id;
        proxy_set_header   X-Role $role;
        proxy_set_header   X-Tenant-ID $tenant_id;
        proxy_set_header   X-Username $username;
        proxy_pass         http://$upstream;
    }

    # Public: the invitee completes a provisioned account with the one-time token
    # in the body, so this must not go through the authenticated /api/user block.
    location ~ ^/api/users/[^/]+/activate$ {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://$upstream;
    }

    location ~^/api/namespaces/[^/]+/members/accept-invite$ {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request       /auth;
        auth_request_set   $tenant_id $upstream_http_x_tenant_id;
        auth_request_set   $username $upstream_http_x_username;
        auth_request_set   $id $upstream_http_x_id;
        auth_request_set   $api_key $upstream_http_x_api_key;
        auth_request_set   $role $upstream_http_x_role;
        error_page         500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port $x_forwarded_port;
        proxy_set_header   X-Forwarded-Proto $x_forwarded_proto;
        proxy_set_header   X-Api-Key $api_key;
        proxy_set_header   X-ID $id;
        proxy_set_header   X-Request-ID $request_id;
        proxy_set_header   X-Role $role;
        proxy_set_header   X-Tenant-ID $tenant_id;
        proxy_set_header   X-Username $username;
        proxy_pass         http://$upstream;
    }

    location ~^/api/namespaces/[^/]+/members/[^/]+/accept-invite$ {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request off;

        proxy_http_version 1.1;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port $x_forwarded_port;
        proxy_set_header   X-Forwarded-Proto $x_forwarded_proto;
        proxy_set_header   X-Request-ID $request_id;

        proxy_pass         http://$upstream;
    }

    # Public: a logged-out invitee opens the accept-invite link and resolves the
    # invite by its code before any account/session exists, so this must skip auth.
    location = /api/invitations/resolve {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request off;

        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://$upstream;
    }

    {{ if $cfg.EnableEnterprise -}}
    location ~^/api/namespaces/[^/]+/members/invites$ {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request       /auth;
        auth_request_set   $tenant_id $upstream_http_x_tenant_id;
        auth_request_set   $username $upstream_http_x_username;
        auth_request_set   $id $upstream_http_x_id;
        auth_request_set   $api_key $upstream_http_x_api_key;
        auth_request_set   $role $upstream_http_x_role;
        error_page         500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port $x_forwarded_port;
        proxy_set_header   X-Forwarded-Proto $x_forwarded_proto;
        proxy_set_header   X-Api-Key $api_key;
        proxy_set_header   X-ID $id;
        proxy_set_header   X-Request-ID $request_id;
        proxy_set_header   X-Role $role;
        proxy_set_header   X-Tenant-ID $tenant_id;
        proxy_set_header   X-Username $username;
        proxy_pass         http://$upstream;
    }
    {{ end -}}

    {{ if $cfg.EnableEnterprise -}}
    location ~ ^/api/namespaces/([^/]+)/support$ {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $username $upstream_http_x_username;
        auth_request_set $id $upstream_http_x_id;
        auth_request_set $role $upstream_http_x_role;
        error_page 500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header X-ID $id;
        proxy_set_header X-Role $role;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Username $username;
        proxy_pass http://$upstream;
    }
    {{ end -}}

    {{ if $cfg.EnableEnterprise -}}
    location ~ ^/api/devices/([^/]+)/tunnels(/.*)?$  {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $username $upstream_http_x_username;
        auth_request_set $id $upstream_http_x_id;
        auth_request_set $role $upstream_http_x_role;
        error_page 500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header X-ID $id;
        proxy_set_header X-Role $role;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Username $username;
        proxy_pass http://$upstream;
    }

    location ~ ^/api/web-endpoints(/.*)?$  {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $username $upstream_http_x_username;
        auth_request_set $id $upstream_http_x_id;
        auth_request_set $role $upstream_http_x_role;
        error_page 500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header X-ID $id;
        proxy_set_header X-Role $role;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Username $username;
        proxy_pass http://$upstream;
    }
    {{ end -}}

    location ~ ^/(install.sh|kickstart.sh)$ {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        rewrite ^/(.*)$ /api/install break;
        # The script embeds request-derived defaults (SERVER_ADDRESS from the
        # forwarded host), so it must never be cached: a shared cache would serve
        # one requester's address to everyone.
        add_header Cache-Control "no-store";
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $x_forwarded_port;
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
        proxy_pass http://$upstream;
    }

    location /api/auth/user {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request /auth/skip;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $username $upstream_http_x_username;
        auth_request_set $id $upstream_http_x_id;
        auth_request_set $role $upstream_http_x_role;
        error_page 500 =401 /auth;
        proxy_set_header X-ID $id;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Role $role;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Username $username;
        proxy_pass http://$upstream;
    }

    {{ if eq $cfg.Env "development" -}}
    location /openapi {
        set $upstream openapi:8080;

        proxy_pass http://$upstream;
    }

    location /openapi/mock {
        set $upstream openapi:8080;

        rewrite ^/openapi/mock/?(.*)$ /$1 break;
        proxy_pass http://$upstream;
    }

    location /openapi/proxy {
        set $upstream openapi:8080;

        rewrite ^/openapi/proxy/?(.*)$ /$1 break;
        proxy_pass http://$upstream;
    }
    {{- end }}

    location ~ ^/admin$ {
        rewrite ^/admin/?$ /admin/ permanent;
    }

    {{ if $cfg.EnableEnterprise -}}
    location /admin/api {
        set $upstream {{ $cfg.APIBackend }};

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $username $upstream_http_x_username;
        auth_request_set $id $upstream_http_x_id;
        auth_request_set $api_key $upstream_http_x_api_key;
        auth_request_set $role $upstream_http_x_role;
        auth_request_set $admin $upstream_http_x_admin;
        error_page 500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $x_forwarded_port;
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
        proxy_set_header X-Api-Key $api_key;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Role $role;
        proxy_set_header X-Username $username;
        proxy_set_header X-Admin $admin;

        rewrite ^/admin/(.*)$ /admin/$1 break;
        proxy_pass http://$upstream;
    }
    {{ end -}}

    location /ssh/connection {
        set $upstream ssh:8080;

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $device_uid $upstream_http_x_device_uid;
        proxy_pass http://$upstream;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        {{ if $cfg.EnableProxyProtocol -}}
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        {{ else -}}
        proxy_set_header X-Real-IP $x_real_ip;
        {{ end -}}
        proxy_set_header X-Device-UID $device_uid;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_socket_keepalive on;
        proxy_redirect off;
    }

    location /ssh/revdial {
        set $upstream ssh:8080;

        proxy_pass http://$upstream;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        {{ if $cfg.EnableProxyProtocol -}}
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        {{ else -}}
        proxy_set_header X-Real-IP $x_real_ip;
        {{ end -}}
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_socket_keepalive on;
        proxy_redirect off;
    }

    location /agent/connection {
        set $upstream ssh:8080;

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $device_uid $upstream_http_x_device_uid;
        proxy_pass http://$upstream;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        {{ if $cfg.EnableProxyProtocol -}}
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        {{ else -}}
        proxy_set_header X-Real-IP $x_real_ip;
        {{ end -}}
        proxy_set_header X-Device-UID $device_uid;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_socket_keepalive on;
        proxy_redirect off;
    }

    location /ssh/auth {
        set $upstream {{ $cfg.APIBackend }};

        auth_request /auth;
        auth_request_set $device_uid $upstream_http_x_device_uid;
        error_page 500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$upstream;
        proxy_set_header X-Device-UID $device_uid;
        proxy_set_header X-Request-ID $request_id;
    }

    {{ if $cfg.EnableCloud -}}
    location /api/users/invitations {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request       /auth;
        auth_request_set   $tenant_id $upstream_http_x_tenant_id;
        auth_request_set   $username $upstream_http_x_username;
        auth_request_set   $id $upstream_http_x_id;
        auth_request_set   $api_key $upstream_http_x_api_key;
        auth_request_set   $role $upstream_http_x_role;
        error_page         500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   X-Api-Key $api_key;
        proxy_set_header   X-ID $id;
        proxy_set_header   X-Request-ID $request_id;
        proxy_set_header   X-Role $role;
        proxy_set_header   X-Tenant-ID $tenant_id;
        proxy_set_header   X-Username $username;
        proxy_pass         http://$upstream;
    }

    location ~^/api/namespaces/[^/]+/invitations(/.*)?$ {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request       /auth;
        auth_request_set   $tenant_id $upstream_http_x_tenant_id;
        auth_request_set   $username $upstream_http_x_username;
        auth_request_set   $id $upstream_http_x_id;
        auth_request_set   $api_key $upstream_http_x_api_key;
        auth_request_set   $role $upstream_http_x_role;
        error_page         500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port $x_forwarded_port;
        proxy_set_header   X-Forwarded-Proto $x_forwarded_proto;
        proxy_set_header   X-Api-Key $api_key;
        proxy_set_header   X-ID $id;
        proxy_set_header   X-Request-ID $request_id;
        proxy_set_header   X-Role $role;
        proxy_set_header   X-Tenant-ID $tenant_id;
        proxy_set_header   X-Username $username;
        proxy_pass         http://$upstream;
    }
    {{ end -}}

    {{ if $cfg.EnableCloud -}}
    location /api/announcements {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        proxy_pass http://$upstream;
    }
    {{ end -}}

    {{ if $cfg.EnableCloud -}}
    location /api/billing {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $username $upstream_http_x_username;
        auth_request_set $id $upstream_http_x_id;
        auth_request_set $role $upstream_http_x_role;
        error_page 500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header X-ID $id;
        proxy_set_header X-Role $role;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Username $username;
        proxy_pass http://$upstream;
    }
    {{ end -}}

    {{ if $cfg.EnableCloud -}}
    location /api/connector {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $username $upstream_http_x_username;
        auth_request_set $id $upstream_http_x_id;
        auth_request_set $role $upstream_http_x_role;
        error_page 500 =401 /auth;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Username $username;
        proxy_set_header X-ID $id;
        proxy_set_header X-Role $role;
        proxy_pass http://$upstream;
    }
    {{ end -}}

    {{ if $cfg.EnableEnterprise -}}
    location /api/firewall {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $username $upstream_http_x_username;
        auth_request_set $id $upstream_http_x_id;
        auth_request_set $role $upstream_http_x_role;
        error_page 500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header X-ID $id;
        proxy_set_header X-Role $role;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Username $username;
        proxy_pass http://$upstream;
    }
    {{ end -}}

    # Account registration / invited-account completion. Public in every edition (the invitee
    # isn't logged in): the invite code in the body is the credential.
    location /api/register {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request     off;
        proxy_set_header X-Real-IP $x_real_ip;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass       http://$upstream;
    }

    {{ if $cfg.EnableEnterprise -}}
    location /api/user/saml/auth {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request     off;
        proxy_set_header X-Real-IP         $x_real_ip;
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_pass       http://$upstream;
    }

    location /api/user/mfa {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request     /auth;
        auth_request_set $id $upstream_http_x_id;
        error_page       500 =401 /auth;
        proxy_set_header X-Real-IP $x_real_ip;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-ID $id;
        proxy_pass       http://$upstream;
    }

    location ~^/api/user/mfa/(auth|recover|reset)(?:/.*)?$ {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request     off;
        proxy_set_header X-Real-IP $x_real_ip;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass       http://$upstream;
    }

    {{ end -}}

    {{ if $cfg.EnableCloud -}}
    location /api/user/recover_password {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://$upstream;
    }
    {{ end -}}

    {{ if $cfg.EnableCloud -}}
    location ~* /api/user/(.*)/update_password {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        proxy_pass http://$upstream;
    }
    {{ end -}}

    {{ if $cfg.EnableCloud -}}
    location /api/user/resend_email {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://$upstream;
    }
    {{ end -}}

    {{ if $cfg.EnableCloud -}}
    location /api/user/validation_account {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        proxy_pass http://$upstream;
    }
    {{ end -}}

    {{ if $cfg.EnableEnterprise -}}
    location ~* /api/sessions/(.*)/records/(.*) {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $username $upstream_http_x_username;
        auth_request_set $role $upstream_http_x_role;
        error_page 500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header X-Role $role;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Username $username;
        proxy_pass http://$upstream;
    }
    {{ end -}}

    location ~* /api/sessions/(.*)/close {
        set $upstream ssh:8080;
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $role $upstream_http_x_role;
        error_page 500 =401 /auth;
        proxy_set_header X-Role $role;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_pass http://$upstream;
    }

    location /api/devices/auth {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request off;
        {{ if $cfg.EnableProxyProtocol -}}
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        {{ else -}}
        proxy_set_header X-Real-IP $x_real_ip;
        {{ end -}}
        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$upstream;
    }

    # Tenant-less pairing: create and status are unauthenticated (the code is
    # the secret), like /api/devices/auth above.
    location /api/devices/pairing {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request off;

        # This is an auth-off prefix: a longer accept/prepare regex that dodges its
        # own charset check falls through to here, so strip any client-supplied
        # identity headers to keep a forged X-ID from reaching the API.
        proxy_set_header X-ID "";
        proxy_set_header X-Role "";
        proxy_set_header X-Username "";
        proxy_set_header X-Tenant-ID "";
        proxy_set_header X-Device-UID "";
        proxy_set_header X-Admin "";
        {{ if $cfg.EnableProxyProtocol -}}
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        {{ else -}}
        proxy_set_header X-Real-IP $x_real_ip;
        {{ end -}}
        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$upstream;
    }

    # Minting a pre-authorized pairing code requires a user token; this regex
    # location takes precedence over the unauthenticated /api/devices/pairing
    # prefix above so the API receives the acting user's claims.
    location ~^/api/devices/pairing/prepare$ {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=pairing_limit burst=5 nodelay;

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $username $upstream_http_x_username;
        auth_request_set $id $upstream_http_x_id;
        auth_request_set $role $upstream_http_x_role;
        error_page 500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-ID $id;
        proxy_set_header X-Role $role;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Username $username;
        proxy_set_header X-Request-ID $request_id;
        proxy_pass http://$upstream;
    }

    # Accepting a pairing requires a user token; this regex location takes
    # precedence over the unauthenticated /api/devices/pairing prefix above.
    # The code alphabet is validated by the API; nginx only routes, so the
    # segment match stays loose (letters/digits/hyphen, any case).
    location ~^/api/devices/pairing/[A-Za-z0-9-]+/accept$ {
        set $upstream {{ $cfg.APIBackend }};
        # Tighter per-IP limit than the global api_limit: accept is the action
        # that enrolls a device, so it's the endpoint worth throttling against a
        # code brute-force. One-shot user action (not agent-polled), so a low
        # rate doesn't hurt.
        limit_req zone=pairing_limit burst=5 nodelay;

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $username $upstream_http_x_username;
        auth_request_set $id $upstream_http_x_id;
        auth_request_set $role $upstream_http_x_role;
        error_page 500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-ID $id;
        proxy_set_header X-Role $role;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Username $username;
        proxy_set_header X-Request-ID $request_id;
        proxy_pass http://$upstream;
    }

    # Device login flow endpoints are authenticated with the device's own
    # token. This regex location takes precedence over the unauthenticated
    # /api/devices/auth prefix above and forwards the device claims set by
    # the auth subrequest; proxy_set_header also prevents spoofing of
    # X-Device-UID from the client.
    location ~^/api/devices/auth/(code|status)$ {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request /auth;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $device_uid $upstream_http_x_device_uid;
        error_page 500 =401 /auth;
        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Device-UID $device_uid;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Request-ID $request_id;
        proxy_pass http://$upstream;
    }

    location /api/login {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request off;
        proxy_pass http://$upstream;
    }

    location /api/webhook-billing {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        auth_request off;
        proxy_pass http://$upstream;
    }

    location /auth {
        set $upstream_auth {{ $cfg.APIBackend }};

        internal;
        rewrite ^/(.*)$ /internal/$1 break;
        proxy_http_version 1.1;
        proxy_pass http://$upstream_auth;
    }

    location /auth/skip {
        set $upstream_auth {{ $cfg.APIBackend }};

        internal;
        rewrite ^/auth/(.*)$ /internal/auth?args=$1 break;
        proxy_http_version 1.1;
        proxy_pass http://$upstream_auth;
    }

    location /ws {
        set $upstream ssh:8080;

        proxy_pass http://$upstream;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        {{ if $cfg.EnableProxyProtocol -}}
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        {{ else -}}
        proxy_set_header X-Real-IP $x_real_ip;
        {{ end -}}
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_socket_keepalive on;
        proxy_redirect off;
    }

    location /info {
        set $upstream {{ $cfg.APIBackend }};
        limit_req zone=api_limit{{ if $api_burst }} {{ $api_burst }}{{ end }} {{ $api_delay }};

        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $x_forwarded_port;
        proxy_http_version 1.1;
        proxy_pass http://$upstream;
        rewrite ^/(.*)$ /api/info break;
    }

    location = /nginx_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }

    {{ end }}
}

{{ if eq $cfg.Env "development" }}
# Dev-only: route the marketing website and docs sites by subdomain. The console
# keeps the apex domain via the catch-all above; website.<domain> and
# docs.<domain> proxy to their dev servers running inside the ui container.
server {
    listen 80;
    server_name website.{{ $cfg.Domain }};
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $upstream ui:8082;

        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 80;
    server_name docs.{{ $cfg.Domain }};
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $upstream ui:8083;

        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
{{ end }}

{{ if and (ne $cfg.Database "migrate") $cfg.EnableEnterprise $cfg.WebEndpoints -}}
{{ $DOMAIN := or $cfg.WebEndpointsDomain $cfg.Domain }}
server {
    {{ if and ($cfg.EnableAutoSSL) (ne $cfg.Env "development") -}}
    listen 443;
    ssl_certificate "/etc/letsencrypt/live/*.{{ $DOMAIN }}/fullchain.pem";
    ssl_certificate_key "/etc/letsencrypt/live/*.{{ $DOMAIN }}/privkey.pem";

    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    ssl_dhparam /etc/shellhub-gateway/dhparam.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    {{ else -}}
    listen 80;
    {{- end }}

    server_name "~^(?<address>[a-f0-9]{32})\.{{ $DOMAIN }}$";
    resolver 127.0.0.11 valid=10s ipv6=off;

    location ~ ^/(?<path>.*) {
        set $upstream ssh:8080;

        rewrite ^/(.*)$ /http/proxy break;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Address $address; 
        proxy_set_header X-Path /$path$is_args$args;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;

        proxy_pass http://$upstream;
    }
}
{{ end }}

{{ if and (ne $cfg.Database "migrate") ($cfg.EnableAutoSSL) (ne $cfg.Env "development") }}
server {
    listen 80 default_server{{ if $cfg.EnableProxyProtocol }} proxy_protocol{{ end }};

    return 308 https://$host$request_uri;
}
{{- end }}

{{/*
    This template is used to set the values of `upstream_host` and `upstream_port`
    dynamically within the request context (`ngx.ctx`). These values are then used by the upstream router
    to direct traffic to the appropriate backend server. To use this template, the `set_upstream` function
    must be called, which handles the internal invocation of this template.
*/}}
