services:
  api:
    image: registry.infra.ossystems.io/shellhub/api-enterprise:${SHELLHUB_VERSION}
    restart: unless-stopped
    environment:
      # Database and Cache connections
      - REDIS_URI=redis://redis:6379
      # Keys paths (mounted via secrets)
      - ADMIN_API_PRIVATE_KEY=/run/secrets/api_private_key
      - ADMIN_API_PUBLIC_KEY=/run/secrets/api_public_key
      # Domain and SSL
      - DOMAIN=${SHELLHUB_DOMAIN}
      - AUTO_SSL=${SHELLHUB_AUTO_SSL}
      # SAML
      - SAML_SECRET=${SHELLHUB_SAML_SECRET}
      - ADMIN_API_USERNAME=${SHELLHUB_ENTERPRISE_ADMIN_USERNAME}
      - ADMIN_API_PASSWORD=${SHELLHUB_ENTERPRISE_ADMIN_PASSWORD}
      # Object storage
      - SHELLHUB_OBJECT_STORAGE_ENDPOINT=${SHELLHUB_OBJECT_STORAGE_ENDPOINT}
      - SHELLHUB_OBJECT_STORAGE_REGION=${SHELLHUB_OBJECT_STORAGE_REGION}
      - SHELLHUB_OBJECT_STORAGE_BUCKET=${SHELLHUB_OBJECT_STORAGE_BUCKET}
      - SHELLHUB_OBJECT_STORAGE_ACCESS_KEY=${SHELLHUB_OBJECT_STORAGE_ACCESS_KEY}
      - SHELLHUB_OBJECT_STORAGE_SECRET_KEY=${SHELLHUB_OBJECT_STORAGE_SECRET_KEY}
      # Web endpoints (feature gate read by the enterprise binary)
      - SHELLHUB_WEB_ENDPOINTS=${SHELLHUB_WEB_ENDPOINTS}
      - SHELLHUB_WEB_ENDPOINTS_DOMAIN=${SHELLHUB_WEB_ENDPOINTS_DOMAIN}
    secrets:
      - api_private_key
      - api_public_key
    networks:
      - shellhub

  ui:
    image: registry.infra.ossystems.io/cache/shellhubio/ui:${SHELLHUB_VERSION}
    environment:
      - SHELLHUB_WEB_ENDPOINTS=${SHELLHUB_WEB_ENDPOINTS}
      - SHELLHUB_WEB_ENDPOINTS_DOMAIN=${SHELLHUB_WEB_ENDPOINTS_DOMAIN}

  gateway:
    image: registry.infra.ossystems.io/cache/shellhubio/gateway:${SHELLHUB_VERSION}
    environment:
      - SHELLHUB_WEB_ENDPOINTS=${SHELLHUB_WEB_ENDPOINTS}
      - SHELLHUB_WEB_ENDPOINTS_DOMAIN=${SHELLHUB_WEB_ENDPOINTS_DOMAIN}
      - SHELLHUB_WEB_ENDPOINTS_DNS_PROVIDER=${SHELLHUB_WEB_ENDPOINTS_DNS_PROVIDER}
      - SHELLHUB_WEB_ENDPOINTS_DNS_PROVIDER_TOKEN=${SHELLHUB_WEB_ENDPOINTS_DNS_PROVIDER_TOKEN}
      - SHELLHUB_WEB_ENDPOINTS_ACME_DNS_URL=${SHELLHUB_WEB_ENDPOINTS_ACME_DNS_URL}
      - SHELLHUB_WEB_ENDPOINTS_ACME_DNS_USERNAME=${SHELLHUB_WEB_ENDPOINTS_ACME_DNS_USERNAME}
      - SHELLHUB_WEB_ENDPOINTS_ACME_DNS_PASSWORD=${SHELLHUB_WEB_ENDPOINTS_ACME_DNS_PASSWORD}
      - SHELLHUB_WEB_ENDPOINTS_ACME_DNS_SUBDOMAIN=${SHELLHUB_WEB_ENDPOINTS_ACME_DNS_SUBDOMAIN}

  cli:
    image: registry.infra.ossystems.io/cache/shellhubio/cli:${SHELLHUB_VERSION}

  redis:
    image: registry.infra.ossystems.io/cache/valkey/valkey:9.1-alpine

  ssh:
    image: registry.infra.ossystems.io/cache/shellhubio/ssh:${SHELLHUB_VERSION}
    environment:
      - SHELLHUB_WEB_ENDPOINTS=${SHELLHUB_WEB_ENDPOINTS}
      - SHELLHUB_WEB_ENDPOINTS_DOMAIN=${SHELLHUB_WEB_ENDPOINTS_DOMAIN}

  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    restart: unless-stopped
    command: server /data
    environment:
      - MINIO_ROOT_USER=${SHELLHUB_OBJECT_STORAGE_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${SHELLHUB_OBJECT_STORAGE_SECRET_KEY}
    networks:
      - shellhub
